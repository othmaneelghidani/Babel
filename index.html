<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بابل 17.0 | ريلز ووسائط حية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --surf: #111; --pri: #00f2ea; --sec: #ff0050; --txt: #fff; --dim: #aaa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* شريط التنقل السفلي للهواتف */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--surf); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--dim); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .nav-btn.active { color: var(--pri); }

        /* منطقة المحتوى */
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 70px; }
        .section { display: none; }
        .section.active { display: block; }

        /* تصميم الريلز (Reels) */
        .reels-container { height: calc(100vh - 60px); scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .reel-video { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .reel-video video { width: 100%; height: 100%; object-fit: cover; }
        .reel-info { position: absolute; bottom: 80px; right: 20px; text-align: right; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .reel-actions { position: absolute; bottom: 100px; left: 15px; display: flex; flex-direction: column; gap: 20px; }

        /* صندوق النشر */
        .create-post { background: var(--surf); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid var(--pri); }
        textarea { width: 100%; background: transparent; border: none; color: #fff; outline: none; resize: none; font-size: 1.1rem; }
        .media-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; }
        
        /* المنشورات */
        .post-card { background: var(--surf); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .post-media { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }

        /* الفيديو كول */
        #video-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        video#local-v { width: 100px; height: 150px; position: absolute; top: 20px; left: 20px; border: 2px solid var(--pri); border-radius: 10px; object-fit: cover; z-index: 10; }
        video#remote-v { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="content-area">
        <div id="sec-home" class="section active">
            <h2 style="padding: 15px; color: var(--pri);">بـابـل 17.0 👁️</h2>
            <div class="create-post">
                <textarea id="post-text" placeholder="انشر فيديو، صورة، أو نصاً حياً..."></textarea>
                <img id="p-preview" class="media-preview">
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <label style="cursor: pointer; background: #333; padding: 5px 15px; border-radius: 20px;">
                        🖼️ وسائط <input type="file" id="file-in" hidden onchange="handleFile(event)">
                    </label>
                    <button onclick="publishPost()" style="background: var(--pri); border: none; padding: 5px 20px; border-radius: 20px; font-weight: bold; margin-right: auto;">نشر 🚀</button>
                </div>
            </div>
            <div id="posts-feed"></div>
        </div>

        <div id="sec-reels" class="section">
            <div class="reels-container" id="reels-feed">
                </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="showSec('home', this)">🏠<span>الرئيسية</span></button>
        <button class="nav-btn" onclick="showSec('reels', this)">🎬<span>ريلز</span></button>
        <button class="nav-btn" onclick="startCall()">📞<span>اتصال</span></button>
    </div>

    <div id="video-overlay">
        <video id="local-v" autoplay muted></video>
        <video id="remote-v" autoplay></video>
        <button onclick="endCall()" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: red; color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem;">❌</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLEkACbZT1gMs9BGkiuxJxSvsHJGKTryk",
            authDomain: "babel-e12d7.firebaseapp.com",
            databaseURL: "https://babel-e12d7-default-rtdb.firebaseio.com",
            projectId: "babel-e12d7",
            storageBucket: "babel-e12d7.firebasestorage.app",
            messagingSenderId: "825559802990",
            appId: "1:825559802990:web:07446bfa45edf3358d327f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let mediaData = null, mediaType = null;

        function handleFile(e) {
            const file = e.target.files[0];
            mediaType = file.type.split('/')[0];
            const reader = new FileReader();
            reader.onload = () => {
                mediaData = reader.result;
                const preview = document.getElementById('p-preview');
                preview.src = mediaData;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function publishPost() {
            const text = document.getElementById('post-text').value;
            if(!text && !mediaData) return;
            db.ref('posts').push({
                author: "المُبتكر",
                content: text,
                media: mediaData,
                type: mediaType,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            document.getElementById('post-text').value = '';
            document.getElementById('p-preview').style.display = 'none';
            mediaData = null;
        }

        db.ref('posts').on('value', snap => {
            const postsFeed = document.getElementById('posts-feed');
            const reelsFeed = document.getElementById('reels-feed');
            postsFeed.innerHTML = ''; reelsFeed.innerHTML = '';
            
            snap.forEach(child => {
                const p = child.val();
                // إضافة للمنشورات العادية
                postsFeed.innerHTML = `
                    <div class="post-card">
                        <strong>👤 ${p.author}</strong>
                        <p>${p.content}</p>
                        ${p.media && p.type === 'image' ? `<img src="${p.media}" class="post-media">` : ''}
                        ${p.media && p.type === 'video' ? `<video src="${p.media}" class="post-media" controls></video>` : ''}
                    </div>
                ` + postsFeed.innerHTML;

                // إضافة للريلز إذا كان فيديو
                if(p.media && p.type === 'video') {
                    reelsFeed.innerHTML += `
                        <div class="reel-video">
                            <video src="${p.media}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                            <div class="reel-info">
                                <h3>@${p.author}</h3>
                                <p>${p.content}</p>
                            </div>
                            <div class="reel-actions">
                                <span>❤️</span><span>💬</span><span>🚀</span>
                            </div>
                        </div>
                    `;
                }
            });
        });

        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        let stream;
        async function startCall() {
            document.getElementById('video-overlay').style.display = 'flex';
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-v').srcObject = stream;
        }
        function endCall() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('video-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
