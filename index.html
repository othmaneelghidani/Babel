<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بابل 16.0 | النظام المتكامل</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===========================
         Sidebar
    ============================ -->
    <div class="sidebar">
        <h2>بابل 16.0 👁️</h2>
        <div id="welcome">مرحباً زائر</div>
        <div id="login">
            <button onclick="login()">تسجيل الدخول عبر Google</button>
        </div>
    </div>

    <!-- ===========================
         Main Content
    ============================ -->
    <div class="main">

        <!-- Stories Bar -->
        <div class="stories-bar" id="storiesBar">
            <!-- ستظهر القصص هنا -->
        </div>

        <!-- Create Post -->
        <div class="create-post">
            <textarea id="postText" rows="2" placeholder="اكتب شيئاً ليراه الجميع ويعلقوا عليه..."></textarea>
            <input type="file" id="mediaInput" accept="image/*,video/*">
            <div class="publish-row">
                <button onclick="sendPost()">نشر 🚀</button>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed">
            <!-- منشورات المستخدمين ستظهر هنا -->
        </div>
    </div>

    <!-- ===========================
         JS
    ============================ -->
    <script src="app.js"></script>
</body>
</html>
