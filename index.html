<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel 16 Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
body{margin:0;background:#050505;color:#fff;font-family:sans-serif}
#login{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;z-index:999}
button{cursor:pointer}
.main{padding:15px;max-width:600px;margin:auto}
.card{background:#121212;padding:15px;border-radius:15px;margin-bottom:20px;border:1px solid #222}
textarea,input{width:100%;background:#000;border:1px solid #222;color:#fff;padding:10px;border-radius:10px}
.pub{background:#00ffcc;color:#000;border:none;padding:10px 20px;border-radius:20px;margin-top:10px}
.like{cursor:pointer;margin-top:10px;display:inline-block}
img,video{width:100%;border-radius:10px;margin-top:10px}
.comment{font-size:0.9rem;margin-top:5px}
</style>
</head>
<body>

<div id="login">
<button onclick="login()" style="padding:20px 40px;background:#00ffcc;border:none;border-radius:10px;font-weight:bold;">
تسجيل الدخول عبر Google
</button>
</div>

<div class="main">
<h2 id="welcome"></h2>

<div class="card">
<textarea id="postText" placeholder="اكتب منشورك..."></textarea>
<input type="file" id="mediaInput" accept="image/*,video/*">
<button class="pub" onclick="sendPost()">نشر</button>
</div>

<div id="feed"></div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCLEkACbZT1gMs9BGkiuxJxSvsHJGKTryk",
authDomain: "babel-e12d7.firebaseapp.com",
databaseURL: "https://babel-e12d7-default-rtdb.firebaseio.com",
projectId: "babel-e12d7",
storageBucket: "babel-e12d7.firebasestorage.app",
messagingSenderId: "825559802990",
appId: "1:825559802990:web:07446bfa45edf3358d327f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

auth.getRedirectResult().then(result => {
  if(result.user){
    currentUser = result.user;
  }
}).catch(error=>{
  console.log(error);
});

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("login").style.display="none";
    document.getElementById("welcome").innerText="مرحباً "+user.displayName;
    loadPosts();
  }
});

async function sendPost(){
if(!currentUser) return;

const text = document.getElementById("postText").value;
const file = document.getElementById("mediaInput").files[0];

if(!text && !file) return;

let mediaURL=null;
let mediaType=null;

if(file){
const ref = storage.ref("media/"+Date.now()+"_"+file.name);
await ref.put(file);
mediaURL = await ref.getDownloadURL();
mediaType = file.type.startsWith("video") ? "video":"image";
}

db.ref("posts").push({
uid: currentUser.uid,
author: currentUser.displayName,
text: text || "",
mediaURL,
mediaType,
likes:0,
time: firebase.database.ServerValue.TIMESTAMP
});

document.getElementById("postText").value="";
document.getElementById("mediaInput").value="";
}

function addLike(id,likes){
db.ref("posts/"+id).update({likes:likes+1});
}

function sendComment(id){
const input = document.getElementById("c_"+id);
if(!input.value) return;

db.ref("posts/"+id+"/comments").push({
user: currentUser.displayName,
text: input.value
});

input.value="";
}

function loadPosts(){
db.ref("posts").on("value",snap=>{
const feed=document.getElementById("feed");
feed.innerHTML="";
snap.forEach(child=>{
const p=child.val();
const id=child.key;

let media="";
if(p.mediaURL){
if(p.mediaType==="video"){
media=`<video src="${p.mediaURL}" controls></video>`;
}else{
media=`<img src="${p.mediaURL}">`;
}
}

let comments="";
if(p.comments){
Object.values(p.comments).forEach(c=>{
comments+=`<div class="comment"><b>${c.user}:</b> ${c.text}</div>`;
});
}

feed.innerHTML=
`<div class="card">
<b>${p.author}</b>
<p>${p.text}</p>
${media}
<div class="like" onclick="addLike('${id}',${p.likes||0})">
❤️ ${p.likes||0}
</div>

<div style="margin-top:10px">
${comments}
<input id="c_${id}" placeholder="اكتب تعليق">
<button onclick="sendComment('${id}')">↩</button>
</div>
</div>` + feed.innerHTML;

});
});
}
</script>
</body>
</html>
