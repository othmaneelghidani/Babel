<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بابل 18.0 | الشبكة الاجتماعية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --surf: #111; --pri: #00f2ea; --sec: #ff0050; --txt: #fff; --dim: #888; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* شريط التنقل العلوي للملف الشخصي */
        .top-bar { padding: 15px; background: var(--surf); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الملف الشخصي */
        .profile-header { text-align: center; padding: 30px 20px; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .p-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--pri); margin-bottom: 10px; }
        .stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 1.2rem; }

        /* نظام الدردشة */
        .chat-container { height: 100%; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; }
        .msg.sent { align-self: flex-start; background: var(--pri); color: #000; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-end; background: #222; border-bottom-left-radius: 2px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--surf); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-btn { background: none; border: none; color: var(--dim); font-size: 0.75rem; cursor: pointer; }
        .nav-btn.active { color: var(--pri); }
        
        /* المنشورات */
        .post-card { background: var(--surf); margin: 15px; padding: 15px; border-radius: 15px; border-right: 4px solid var(--pri); }
        .follow-btn { background: var(--pri); color: #000; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="current-view-title" style="font-weight: bold; color: var(--pri);">الساحة العامة</div>
        <div onclick="showView('profile', this)" style="cursor:pointer">👤</div>
    </div>

    <div class="content-area">
        <div id="view-home" class="view active">
            <div id="posts-feed"></div>
        </div>

        <div id="view-profile" class="view">
            <div class="profile-header">
                <div class="p-avatar" id="prof-img">👤</div>
                <h2 id="prof-name">المُبتكر</h2>
                <div class="stats">
                    <div class="stat-item"><span class="stat-num">150</span> متابِع</div>
                    <div class="stat-item"><span class="stat-num">89</span> منشور</div>
                </div>
                <button class="follow-btn" id="main-follow-btn">متابعة +</button>
            </div>
            <div id="user-posts"></div>
        </div>

        <div id="view-chat" class="view" style="height: 80vh;">
            <div class="chat-container">
                <div class="chat-messages" id="chat-box">
                    <div style="text-align:center; color:#555;">اختر مستخدماً لبدء المحادثة...</div>
                </div>
                <div style="padding:15px; display:flex; gap:10px;">
                    <input type="text" id="chat-in" style="flex:1; background:#222; border:none; color:#fff; padding:10px; border-radius:20px; outline:none;" placeholder="اكتب رسالة سرية...">
                    <button onclick="sendDirectMsg()" style="background:var(--pri); border:none; width:40px; height:40px; border-radius:50%;">🚀</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="showView('home', this)">🏠<br>الرئيسية</button>
        <button class="nav-btn" onclick="alert('قسم الريلز مدمج في الرئيسية الآن!')">🎬<br>ريلز</button>
        <button class="nav-btn" onclick="showView('chat', this)">💬<br>رسائل</button>
        <button class="nav-btn" onclick="showView('profile', this)">👤<br>أنا</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLEkACbZT1gMs9BGkiuxJxSvsHJGKTryk",
            authDomain: "babel-e12d7.firebaseapp.com",
            databaseURL: "https://babel-e12d7-default-rtdb.firebaseio.com",
            projectId: "babel-e12d7",
            storageBucket: "babel-e12d7.firebasestorage.app",
            messagingSenderId: "825559802990",
            appId: "1:825559802990:web:07446bfa45edf3358d327f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const myID = "user_" + Math.floor(Math.random() * 1000); // معرف وهمي للاختبار
        const myName = "المُبتكر";
        let activeChatPartner = null;

        // --- وظائف الواجهة ---
        function showView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('current-view-title').innerText = id.toUpperCase();
        }

        // --- جلب المنشورات والملفات الشخصية ---
        db.ref('posts').on('value', snap => {
            const feed = document.getElementById('posts-feed');
            feed.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                feed.innerHTML = `
                    <div class="post-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong onclick="openProfile('${p.author}')" style="cursor:pointer; color:var(--pri);">@${p.author}</strong>
                            <button class="follow-btn" style="font-size:0.7rem;" onclick="openChat('${p.author}')">رسالة ✉️</button>
                        </div>
                        <p>${p.content}</p>
                        ${p.media ? `<img src="${p.media}" style="width:100%; border-radius:10px;">` : ''}
                    </div>
                ` + feed.innerHTML;
            });
        });

        function openProfile(name) {
            document.getElementById('prof-name').innerText = name;
            showView('profile');
        }

        // --- نظام الدردشة المباشرة (Direct Messages) ---
        function openChat(partner) {
            activeChatPartner = partner;
            document.getElementById('current-view-title').innerText = "دردشة مع " + partner;
            showView('chat');
            listenToMessages();
        }

        function sendDirectMsg() {
            const text = document.getElementById('chat-in').value;
            if(!text || !activeChatPartner) return;
            
            const chatId = [myName, activeChatPartner].sort().join("_");
            db.ref('chats/' + chatId).push({
                sender: myName,
                text: text,
                time: firebase.database.ServerValue.TIMESTAMP
            });
            document.getElementById('chat-in').value = '';
        }

        function listenToMessages() {
            const chatId = [myName, activeChatPartner].sort().join("_");
            db.ref('chats/' + chatId).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snap.forEach(child => {
                    const m = child.val();
                    const type = m.sender === myName ? 'sent' : 'received';
                    box.innerHTML += `<div class="msg ${type}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
