<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بابل 16.0 | النظام المتكامل</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===========================
         Sidebar
    ============================ -->
    <div class="sidebar">
        <h2>بابل 16.0 👁️</h2>
        <div id="welcome">مرحباً زائر</div>
        <div id="login">
            <button onclick="login()">تسجيل الدخول عبر Google</button>
        </div>
    </div>

    <!-- ===========================
         Main Content
    ============================ -->
    <div class="main">

        <!-- Stories Bar -->
        <div class="stories-bar" id="storiesBar">
            <!-- ستظهر القصص هنا -->
            <!-- مثال: 
            <div><img src="story1.jpg"></div>
            <div><video src="story2.mp4"></video></div>
            -->
        </div>

        <!-- Create Post -->
        <div class="create-post">
            <textarea id="postText" rows="2" placeholder="اكتب شيئاً ليراه الجميع ويعلقوا عليه..."></textarea>
            <input type="file" id="mediaInput" accept="image/*,video/*">
            <div class="publish-row">
                <button onclick="sendPost()">نشر 🚀</button>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed">
            <!-- مثال هيكل منشور -->
            <div class="card" id="post-example">
                <b>اسم المستخدم</b>
                <p>هذا نص مثال لمنشور</p>
                <img src="example-image.jpg" alt="مثال صورة منشور">
                <video src="example-video.mp4" controls></video>

                <!-- إعجابات -->
                <div class="like" onclick="addLike('post-example')">
                    ❤️ <span id="like-count-post-example">0</span>
                </div>

                <!-- التعليقات -->
                <div class="comments-section" id="comments-post-example">
                    <div class="comment"><b>مستخدم 1:</b> تعليق مثال</div>
                    <div class="comment-input-area">
                        <input type="text" id="com-in-post-example" placeholder="اكتب تعليقاً حياً...">
                        <button onclick="sendComment('post-example')">↩</button>
                    </div>
                </div>
            </div>
            <!-- نهاية مثال منشور -->
        </div>

    </div>

    <!-- ===========================
         JS
    ============================ -->
    <script src="app.js"></script>
</body>
</html>
