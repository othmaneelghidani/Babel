<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel 16.0 | النظام المتكامل</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

</head>
<body>

<div class="sidebar">
  <h2 style="text-align:center;">Babel 16.0 👁️</h2>
  <div id="login">
    <button onclick="login()">تسجيل الدخول عبر Google</button>
  </div>
  <div id="welcome"></div>
  <div id="storiesBar" class="stories-bar"></div>
</div>

<div class="main">
  <div class="create-post">
    <textarea id="postText" rows="2" placeholder="اكتب منشورك..."></textarea>
    <input type="file" id="mediaInput" accept="image/*,video/*">
    <div class="publish-row">
      <button onclick="sendPost()">نشر 🚀</button>
    </div>
  </div>
  
  <div id="feed"></div>
</div>

<script src="app.js"></script>
</body>
</html>
